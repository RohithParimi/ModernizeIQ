scenario_id: blocked-dep-12
category: dependency_blocked
app_id:  app-17be3111  
expected_6r: Retain
acceptable_alternatives: [Rehost]
must_mention_keywords: [dependency, upstream, blocked]
rationale: >
  The application itself is structurally sound, but it maintains a direct network dependency 
  link to a core legacy monolith. Attempting to lift-and-shift this application independently 
  would introduce catastrophic latency over the network pipe. The migration must be deferred 
  until the upstream dependency blocker is remediated.
